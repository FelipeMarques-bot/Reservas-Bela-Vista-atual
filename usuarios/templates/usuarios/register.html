{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Registro - Reservas Bela Vista{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-card shadow-sm mt-5">
                <div class="section-heading mb-4">
                    <span class="iconify" data-icon="mdi:account-plus" data-inline="false" style="font-size: 2.6rem; color: #FF5A5F;"></span>
                    <h2>Registrar</h2>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Registrar</button>
                </form>
                <p class="text-center mt-3">
                    Já tem uma conta? <a href="{% url 'usuarios:login' %}">Faça login aqui</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
