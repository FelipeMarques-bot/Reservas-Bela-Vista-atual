{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - Reservas Bela Vista{% endblock %}

{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4 mt-5">
                <h2 class="card-title text-center mb-4" style="color: #FF5A5F;">Entrar</h2>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                </form>
                <p class="text-center mt-3">
                    Não tem uma conta? <a href="{% url 'usuarios:register' %}">Registre-se aqui</a>
                </p>
            </div>
        </div>
    </div>
{% endblock %}
